name: ci

on: 
  push:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: macOS-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 3   # 只拉取最近3个commit

      - name: Install deno
        uses: denoland/setup-deno@v1

      - name: Run deno
        run: |
          git config --local user.email "renyuzhuo@foxmail.com"
          git config --local user.name "RenYuZhuo"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase
          deno run --unstable --allow-net --allow-read --allow-write --import-map=import_map.json mod.ts
          deno fmt
          git add .
          git commit -m "Update README BY CI" || echo "No changes"
          git push
